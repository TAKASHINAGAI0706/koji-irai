<title>工事依頼案内</title>
<style>
  :root {
    --primary: #1a3a5c;
    --primary-light: #2c6e9e;
    --accent: #e8a020;
    --green: #06c755;
    --red: #c0392b;
    --bg: #f0f4f8;
    --card: #ffffff;
    --border: #dde3ed;
    --text: #1a1a2e;
    --muted: #7a8599;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    font-family: "Hiragino Sans", "Noto Sans JP", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== FIXED TOP BAR ===== */
  .top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--primary);
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,.3);
  }
  .top-bar-title {
    color: #fff;
    font-size: 17px;
    font-weight: bold;
    letter-spacing: 2px;
  }

  /* ===== SCROLL AREA ===== */
  .scroll-area {
    padding-top: calc(var(--safe-top) + 56px);
    padding-bottom: calc(var(--safe-bottom) + 90px);
    padding-left: 12px;
    padding-right: 12px;
  }

  /* ===== SECTION CARD ===== */
  .section-card {
    background: var(--card);
    border-radius: 16px;
    margin: 12px 0;
    overflow: hidden;
    box-shadow: 0 2px 10px rgba(0,0,0,.08);
  }
  .section-header {
    background: var(--primary);
    color: #fff;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-body { padding: 14px 14px 10px; }

  /* ===== FORM ROWS ===== */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: bold;
    color: var(--muted);
    margin-bottom: 5px;
    letter-spacing: .5px;
  }

  /* ── inputs ── */
  .field input[type="date"],
  .field input[type="time"],
  .field input[type="text"],
  .field input[type="number"],
  .field textarea {
    width: 100%;
    font-size: 16px;          /* iOS zoom 防止 */
    font-family: inherit;
    padding: 13px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: #f8fafd;
    color: var(--text);
    appearance: none;
    -webkit-appearance: none;
    transition: border-color .2s, box-shadow .2s;
    line-height: 1.4;
  }
  .field input:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(44,110,158,.18);
    background: #fff;
  }
  .field textarea {
    resize: none;
    min-height: 80px;
    line-height: 1.6;
  }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* 予定金額 prefix */
  .prefix-wrap { position: relative; }
  .prefix-wrap .yen {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--muted);
    font-weight: bold;
    pointer-events: none;
  }
  .prefix-wrap input { padding-left: 30px; }

  /* Map badge */
  .map-wrap { margin-top: 7px; min-height: 24px; }
  .map-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #34a853;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: bold;
    text-decoration: none;
  }
  .map-hint { font-size: 12px; color: var(--muted); }

  /* ===== EQUIPMENT ===== */
  .equip-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 9px;
  }
  .equip-name {
    flex: 1;
    font-size: 16px;
    font-family: inherit;
    padding: 13px 12px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: #f8fafd;
    color: var(--text);
    appearance: none;
    -webkit-appearance: none;
  }
  .equip-qty {
    width: 70px;
    font-size: 16px;
    font-family: inherit;
    padding: 13px 8px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: #f8fafd;
    text-align: center;
    color: var(--text);
    appearance: none;
    -webkit-appearance: none;
  }
  .equip-name:focus, .equip-qty:focus {
    outline: none;
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(44,110,158,.18);
    background: #fff;
  }
  .btn-del {
    width: 40px; height: 40px;
    min-width: 40px;
    border: none;
    background: #fde8e6;
    border-radius: 50%;
    font-size: 18px;
    color: var(--red);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-add-row {
    width: 100%;
    padding: 12px;
    background: #eef6ff;
    border: 1.5px dashed var(--primary-light);
    border-radius: 12px;
    color: var(--primary-light);
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 2px;
  }

  /* ===== GENERATE BUTTON (fixed bottom) ===== */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    padding: 10px 16px calc(var(--safe-bottom) + 10px);
    background: rgba(240,244,248,.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-top: 1px solid var(--border);
  }
  .btn-generate {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(26,58,92,.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-generate:active { opacity: .85; transform: scale(.98); }

  /* ===== OUTPUT SHEET ===== */
  .sheet-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,.45);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }
  .sheet-overlay.open { display: flex; align-items: flex-end; }
  .sheet {
    width: 100%;
    background: var(--card);
    border-radius: 22px 22px 0 0;
    padding: 0 0 calc(var(--safe-bottom) + 16px);
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    animation: slideUp .28s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle {
    width: 40px; height: 4px;
    background: #ddd;
    border-radius: 2px;
    margin: 10px auto 6px;
    flex-shrink: 0;
  }
  .sheet-title {
    font-size: 15px;
    font-weight: bold;
    color: var(--primary);
    padding: 4px 18px 10px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .sheet-body {
    overflow-y: auto;
    padding: 14px 16px;
    flex: 1;
  }
  .output-box {
    background: #f4f8ff;
    border: 1.5px solid #c3d9f0;
    border-radius: 14px;
    padding: 16px;
    font-size: 14px;
    line-height: 2;
    color: #222;
    white-space: pre-wrap;
    word-break: break-all;
    font-family: inherit;
    margin-bottom: 14px;
  }
  .sheet-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .btn-action {
    padding: 15px 10px;
    border: none;
    border-radius: 13px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-action:active { opacity: .8; transform: scale(.97); }
  .btn-copy { background: var(--primary); color: #fff; }
  .btn-line { background: var(--green); color: #fff; }
  .btn-close-sheet {
    width: 100%;
    padding: 13px;
    border: 1.5px solid var(--border);
    border-radius: 13px;
    background: #fff;
    color: var(--muted);
    font-size: 15px;
    cursor: pointer;
  }
  .toast {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 100px);
    left: 50%; transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: bold;
    z-index: 999;
    display: none;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateX(-50%) translateY(6px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-title">🔧 工事依頼案内</div>
</div>

<!-- SCROLL AREA -->
<div class="scroll-area">

  <!-- 日時 -->
  <div class="section-card">
    <div class="section-header">📅 日時</div>
    <div class="section-body">
      <div class="two-col">
        <div class="field">
          <label>作業日</label>
          <input type="date" id="work-date">
        </div>
        <div class="field">
          <label>待合せ時間</label>
          <input type="time" id="meet-time">
        </div>
      </div>
    </div>
  </div>

  <!-- 現場 -->
  <div class="section-card">
    <div class="section-header">📍 現場情報</div>
    <div class="section-body">
      <div class="field">
        <label>現場住所</label>
        <input type="text" id="site-address" placeholder="例: 大阪府大阪市北区中之島2-3-18" oninput="updateMapLink()" autocomplete="street-address">
        <div class="map-wrap" id="map-wrap">
          <span class="map-hint">住所を入力するとGoogleマップリンクが生成されます</span>
        </div>
      </div>
      <div class="two-col">
        <div class="field">
          <label>参考工期</label>
          <input type="text" id="duration" placeholder="例: 約2日間">
        </div>
        <div class="field">
          <label>予定金額</label>
          <div class="prefix-wrap">
            <span class="yen">¥</span>
            <input type="number" id="budget" placeholder="150000" min="0" step="1000" inputmode="numeric">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 持込み依頼器具 -->
  <div class="section-card">
    <div class="section-header">🧰 持込み依頼器具</div>
    <div class="section-body">
      <div id="equip-list"></div>
      <button class="btn-add-row" type="button" onclick="addEquipRow()">＋ 器具を追加</button>
    </div>
  </div>

  <!-- 備考 -->
  <div class="section-card">
    <div class="section-header">📝 備考・メモ</div>
    <div class="section-body">
      <div class="field">
        <label>任意</label>
        <textarea id="memo" placeholder="例: 駐車場は地下P1をご使用ください。&#10;入館証は守衛室で受け取りをお願いします。"></textarea>
      </div>
    </div>
  </div>

</div><!-- /scroll-area -->

<!-- FIXED BOTTOM GENERATE BUTTON -->
<div class="bottom-bar">
  <button class="btn-generate" type="button" onclick="generate()">
    ✉️ 案内テキストを生成する
  </button>
</div>

<!-- OUTPUT BOTTOM SHEET -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📤 送信用テキスト</div>
    <div class="sheet-body">
      <div class="output-box" id="output-text"></div>
      <div class="sheet-actions">
        <button class="btn-action btn-copy" type="button" onclick="copyText()">📋 コピー</button>
        <button class="btn-action btn-line" type="button" onclick="sendLine()">💬 LINEで送る</button>
      </div>
      <button class="btn-close-sheet" type="button" onclick="closeSheet()">✕ 閉じる</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✅ コピーしました！</div>

<script>
// ==================== 器具リスト ====================
let equipCounter = 0;

function addEquipRow(nameVal, qtyVal) {
  equipCounter++;
  const rowId = 'er-' + equipCounter;
  const list = document.getElementById('equip-list');
  const div = document.createElement('div');
  div.className = 'equip-row';
  div.id = rowId;
  div.innerHTML = `
    <input class="equip-name" type="text" placeholder="器具名（例: 充電ドリル）"
      value="${esc(nameVal || '')}" autocomplete="off">
    <input class="equip-qty" type="text" placeholder="数量"
      value="${esc(qtyVal || '')}" inputmode="decimal">
    <button class="btn-del" type="button" onclick="removeEquipRow('${rowId}')">✕</button>
  `;
  list.appendChild(div);
}

function removeEquipRow(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ==================== 地図リンク ====================
function updateMapLink() {
  const addr = document.getElementById('site-address').value.trim();
  const wrap = document.getElementById('map-wrap');
  if (!addr) {
    wrap.innerHTML = '<span class="map-hint">住所を入力するとGoogleマップリンクが生成されます</span>';
    return;
  }
  const url = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(addr);
  wrap.innerHTML = `<a class="map-badge" href="${url}" target="_blank">🗺️ Googleマップで確認</a>`;
}

// ==================== テキスト生成 ====================
function formatDate(v) {
  if (!v) return '（未設定）';
  const d = new Date(v + 'T00:00:00');
  const w = ['日','月','火','水','木','金','土'][d.getDay()];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}）`;
}

function formatBudget(v) {
  const n = parseFloat(v);
  if (!v || isNaN(n)) return '（未入力）';
  return '¥' + n.toLocaleString('ja-JP');
}

function generate() {
  const date     = document.getElementById('work-date').value;
  const time     = document.getElementById('meet-time').value;
  const address  = document.getElementById('site-address').value.trim();
  const duration = document.getElementById('duration').value.trim();
  const budget   = document.getElementById('budget').value;
  const memo     = document.getElementById('memo').value.trim();

  const mapUrl = address
    ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address)
    : '';

  // 器具：DOMから直接読み取り
  const equipLines = [];
  document.querySelectorAll('#equip-list .equip-row').forEach(row => {
    const name = row.querySelector('.equip-name').value.trim();
    const qty  = row.querySelector('.equip-qty').value.trim();
    if (name) equipLines.push(`　${equipLines.length + 1}. ${name}${qty ? '　' + qty : ''}`);
  });

  let t = '';
  t += '【工事依頼のご案内】\n';
  t += '─────────────────\n';
  t += `📅 作業日\n　${formatDate(date)}\n\n`;
  t += `🕐 待合せ時間\n　${time || '（未設定）'}\n\n`;
  t += `📍 現場住所\n　${address || '（未入力）'}\n`;
  if (mapUrl) t += `　📌 地図: ${mapUrl}\n`;
  t += '\n';
  t += `🗓️ 参考工期\n　${duration || '（未入力）'}\n\n`;
  t += `💴 予定金額\n　${formatBudget(budget)}\n\n`;
  if (equipLines.length > 0) t += `🧰 持込み依頼器具\n${equipLines.join('\n')}\n\n`;
  if (memo) t += `📝 備考\n　${memo.replace(/\n/g, '\n　')}\n\n`;
  t += '─────────────────\n';
  t += 'ご確認のほど、よろしくお願いいたします。';

  document.getElementById('output-text').textContent = t;
  document.getElementById('sheet-overlay').classList.add('open');
}

// ==================== シート操作 ====================
function closeSheet(e) {
  if (!e || e.target === document.getElementById('sheet-overlay')) {
    document.getElementById('sheet-overlay').classList.remove('open');
  }
}

// ==================== コピー ====================
async function copyText() {
  const text = document.getElementById('output-text').textContent;
  try { await navigator.clipboard.writeText(text); }
  catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
  showToast('✅ コピーしました！');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2200);
}

// ==================== LINE ====================
function sendLine() {
  const text = document.getElementById('output-text').textContent;
  window.open('https://line.me/R/msg/text/?' + encodeURIComponent(text), '_blank');
}

// ==================== HELPER ====================
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== INIT ====================
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('work-date').value = new Date().toISOString().split('T')[0];
  addEquipRow();
});
</script>
